
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-96x96.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Professional Hypertrophy Tracker with RP-style progression, analytics, and offline support.">
    
    <!-- PWA / Apple Specific -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="IronLog">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <title>IronLog</title>
    
    <!-- TAILWIND CDN REMOVED FOR PRODUCTION -->
    <script>
      // Fallback config if needed or global vars
      window.tailwind = { darkMode: 'class' };
    </script>

    <!-- GLOBAL ERROR HANDLER & WATCHDOG -->
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var msg = message + '\n' + source + ':' + lineno;
        console.error(msg);
        if (message.includes('ResizeObserver')) return;
      };
    </script>

    <style>
      .glass {
        background-color: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(0,0,0,0.05);
      }
      .dark .glass {
        background-color: rgba(24, 24, 27, 0.85);
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      
      .scroll-container::-webkit-scrollbar { width: 0px; background: transparent; }
      
      body {
        background-color: #fafafa;
        color: #18181b;
      }
      .dark body {
        background-color: #09090b;
        color: #f4f4f5;
      }
      
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      @keyframes slideUp {
          from { transform: translateY(100%); opacity: 0; }
          to { transform: translateY(0); opacity: 1; }
      }
      .animate-slideUp {
          animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
    </style>
</head>
  <body class="h-full w-full overflow-hidden select-none transition-colors duration-300">
    <div id="root" class="h-full w-full"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
