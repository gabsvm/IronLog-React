    <title>GainsLab</title>


  <!-- GLOBAL PWA PROMPT CAPTURE -->
  <script>
    window.deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent the mini-infobar from appearing on mobile
      e.preventDefault();
      // Stash the event so it can be triggered later.
      window.deferredPrompt = e;
      console.log("✅ PWA Install Event Captured Globally");
    });
  </script>

  <!-- GLOBAL ERROR HANDLER & WATCHDOG -->
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      var msg = message + '\n' + source + ':' + lineno;
      console.error(msg);
      if (message.includes('ResizeObserver')) return;
      showError(msg);
    };

    setTimeout(function () {
      var root = document.getElementById('root');
      if (!root || root.innerHTML.trim() === '') {
        console.warn("React taking long to mount...");
        showError("Startup Timeout: App did not mount.\nCheck console for Dual React Instance errors or Importmap conflicts.");
      }
    }, 3000);

    function showError(msg) {
      var box = document.getElementById('error-box');
      if (!box) {
        box = document.createElement('div');
        box.id = 'error-box';
        box.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:#09090b; color:#ef4444; z-index:99999; padding:20px; font-family:monospace; white-space:pre-wrap; overflow:auto;';
        document.body.appendChild(box);
        box.innerHTML = '<h2 style="margin-top:0">Application Error</h2>';
      }
      if (!box.innerHTML.includes(msg.substring(0, 20))) {
        box.innerHTML += '<div style="margin-top:10px; border-top:1px solid #333; padding-top:10px;">' + msg + '</div>';
      }
    }

    // REGISTER SERVICE WORKER
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').then(function (registration) {
          console.log('✅ ServiceWorker registration successful with scope: ', registration.scope);
        }, function (err) {
          console.log('❌ ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>

  <style>
    .glass {
      background-color: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .dark .glass {
      background-color: rgba(24, 24, 27, 0.85);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .scroll-container::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }

    body {
      background-color: #fafafa;
      color: #18181b;
    }

    .dark body {
      background-color: #09090b;
      color: #f4f4f5;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .animate-slideUp {
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
